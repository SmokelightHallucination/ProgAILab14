# Single-node etcd for collector coordination (demo scale).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd
  namespace: airquality
spec:
  replicas: 1
  selector:
    matchLabels: {app: etcd}
  template:
    metadata:
      labels: {app: etcd}
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.16
          command:
            - etcd
            - --name=etcd0
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://etcd:2379
            - --listen-peer-urls=http://0.0.0.0:2380
          ports:
            - containerPort: 2379
          readinessProbe:
            exec: {command: ["etcdctl", "endpoint", "health"]}
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: airquality
spec:
  selector: {app: etcd}
  ports:
    - port: 2379
      targetPort: 2379
