# Single-node Kafka in KRaft mode (demo scale).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: airquality
spec:
  replicas: 1
  selector:
    matchLabels: {app: kafka}
  template:
    metadata:
      labels: {app: kafka}
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.8.1
          ports:
            - containerPort: 9092
          env:
            - {name: KAFKA_NODE_ID, value: "1"}
            - {name: KAFKA_PROCESS_ROLES, value: "broker,controller"}
            - {name: KAFKA_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093"}
            - {name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092"}
            - {name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER"}
            - {name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@kafka:9093"}
            - {name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"}
            - {name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1"}
            - {name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1"}
            - {name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1"}
            - {name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "true"}
            # Fixed cluster id + persistent log dir so a container restart does
            # not reformat KRaft storage (which makes single-node Kafka exit).
            - {name: CLUSTER_ID, value: "aq-kraft-cluster-000001"}
            - {name: KAFKA_LOG_DIRS, value: "/var/lib/kafka/data"}
          volumeMounts:
            - {name: kafka-data, mountPath: /var/lib/kafka/data}
          readinessProbe:
            tcpSocket: {port: 9092}
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: kafka-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: airquality
spec:
  selector: {app: kafka}
  ports:
    - port: 9092
      targetPort: 9092
