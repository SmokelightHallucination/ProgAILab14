# Python analyzer (Kafka consumer) and Streamlit dashboard.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyzer
  namespace: airquality
spec:
  replicas: 1
  selector:
    matchLabels: {app: analyzer}
  template:
    metadata:
      labels: {app: analyzer}
    spec:
      containers:
        - name: analyzer
          image: airquality/analyzer:latest
          imagePullPolicy: IfNotPresent
          args: ["scripts.consume_stream"]
          env:
            - {name: KAFKA_BROKERS, value: "kafka:9092"}
            - {name: KAFKA_TOPIC, value: "air-quality.aggregates"}
            - {name: WINDOW_MINUTES, value: "5"}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: airquality
spec:
  replicas: 1
  selector:
    matchLabels: {app: dashboard}
  template:
    metadata:
      labels: {app: dashboard}
    spec:
      containers:
        - name: dashboard
          image: airquality/dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - {containerPort: 8501}
          env:
            - {name: KAFKA_BROKERS, value: "kafka:9092"}
            - {name: KAFKA_TOPIC, value: "air-quality.aggregates"}
            - {name: WINDOW_MINUTES, value: "5"}
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: airquality
spec:
  type: NodePort
  selector: {app: dashboard}
  ports:
    - {port: 8501, targetPort: 8501, nodePort: 30085}
