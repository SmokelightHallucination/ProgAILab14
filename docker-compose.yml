# Full air-quality pipeline (variant 20).
#
#   etcd ── coordinates ──▶ collector-1 / collector-2 (sharded by station)
#                                  │ tumbling-window aggregates
#                                  ├─▶ Kafka topic ──▶ analyzer (5-min sliding window)
#                                  │                └▶ dashboard (Streamlit, live)
#                                  └─▶ Arrow Flight (collector-1, port 8815)
#
# Quick start:  docker compose up --build
#   dashboard → http://localhost:8501
#   collector-1 metrics → http://localhost:9101/metrics
name: airquality

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    command:
      - etcd
      - --name=etcd0
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.8.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  collector-1:
    build:
      context: .
      dockerfile: collector/Dockerfile
    depends_on:
      etcd: {condition: service_healthy}
      kafka: {condition: service_healthy}
    environment:
      INSTANCE_ID: collector-1
      SOURCE: ${SOURCE:-synthetic}
      OPENAQ_API_KEY: ${OPENAQ_API_KEY:-}
      ETCD_ENDPOINTS: etcd:2379
      KAFKA_ENABLED: "true"
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: air-quality.aggregates
      PARQUET_ENABLED: "true"
      PARQUET_PATH: /data/aggregates.parquet
      FLIGHT_ENABLED: "true"
      FLIGHT_ADDR: 0.0.0.0:8815
      WINDOW_SIZE: 10s
      POLL_INTERVAL: 2s
      METRICS_ADDR: 0.0.0.0:9100
    ports:
      - "9101:9100"  # Prometheus metrics
      - "8815:8815"  # Arrow Flight
    volumes:
      - ./data:/data

  collector-2:
    build:
      context: .
      dockerfile: collector/Dockerfile
    depends_on:
      etcd: {condition: service_healthy}
      kafka: {condition: service_healthy}
    environment:
      INSTANCE_ID: collector-2
      SOURCE: ${SOURCE:-synthetic}
      OPENAQ_API_KEY: ${OPENAQ_API_KEY:-}
      ETCD_ENDPOINTS: etcd:2379
      KAFKA_ENABLED: "true"
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: air-quality.aggregates
      PARQUET_ENABLED: "false"   # collector-1 owns the shared Parquet file
      FLIGHT_ENABLED: "false"
      WINDOW_SIZE: 10s
      POLL_INTERVAL: 2s
      METRICS_ADDR: 0.0.0.0:9100
    ports:
      - "9102:9100"

  analyzer:
    build:
      context: .
      dockerfile: analyzer/Dockerfile
    depends_on:
      kafka: {condition: service_healthy}
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: air-quality.aggregates
      WINDOW_MINUTES: 5
    command: ["scripts.consume_stream"]

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    depends_on:
      kafka: {condition: service_healthy}
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: air-quality.aggregates
      WINDOW_MINUTES: 5
    ports:
      - "8501:8501"
